name: Déploiement backend (Heroku)

# Build de l'image Docker du backend et release sur Heroku (registry conteneur)
# à chaque push sur main touchant backend/. Le runner GitHub a Docker + Heroku CLI.
#
# Prérequis (Settings → Secrets and variables → Actions) :
#   - Variable  HEROKU_APP        = nom de l'app Heroku (ex. bmx-api)
#   - Secret    HEROKU_API_KEY    = clé d'API Heroku (`heroku authorizations:create`)
# Sans ces réglages, le job est ignoré (garde `if`).

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & release (conteneur Heroku)
    runs-on: ubuntu-latest
    if: ${{ vars.HEROKU_APP != '' }}
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP: ${{ vars.HEROKU_APP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer le CLI Heroku
        run: |
          if ! command -v heroku >/dev/null 2>&1; then
            curl https://cli-assets.heroku.com/install.sh | sh
          fi
          heroku --version

      - name: Provisionner l'app (idempotent)
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: |
          set -e
          # App (créée en stack container si absente)
          heroku apps:info -a "$HEROKU_APP" >/dev/null 2>&1 || heroku create "$HEROKU_APP" --stack container
          heroku stack:set container -a "$HEROKU_APP" >/dev/null 2>&1 || true
          # Postgres (si absent)
          heroku addons -a "$HEROKU_APP" 2>/dev/null | grep -qi postgres || \
            heroku addons:create heroku-postgresql:essential-0 -a "$HEROKU_APP"
          # Secret JWT (généré une seule fois)
          if [ -z "$(heroku config:get JWT_SECRET -a "$HEROKU_APP" 2>/dev/null)" ]; then
            heroku config:set JWT_SECRET="$(openssl rand -hex 32)" -a "$HEROKU_APP"
          fi
          heroku config:set -a "$HEROKU_APP" \
            JWT_TTL_HOURS=72 \
            RUST_LOG="info,api=info,sqlx=warn" \
            APP_BASE_URL="${APP_BASE_URL:-https://maxlestage.github.io/BMX}"

      - name: Connexion au registry Heroku
        run: heroku container:login

      - name: Build & push de l'image
        working-directory: backend
        run: heroku container:push web -a "$HEROKU_APP"

      - name: Release
        run: heroku container:release web -a "$HEROKU_APP"

      - name: Vérification de santé
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://$HEROKU_APP.herokuapp.com/api/v1/healthz" || true)
            if [ "$code" = "200" ]; then echo "✓ API en ligne"; exit 0; fi
            sleep 3
          done
          echo "⚠ Pas de 200 — voir: heroku logs --tail -a $HEROKU_APP"
